<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      padding: 16px;
      background: #1e1e2f;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    h3 { margin-bottom: 12px; text-align: center; }
    .toggle-switch {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2d2d3a;
      padding: 8px 12px;
      border-radius: 28px;
      margin-bottom: 16px;
    }
    .toggle-btn {
      width: 44px;
      height: 24px;
      background: #555;
      border-radius: 40px;
      position: relative;
      cursor: pointer;
    }
    .toggle-btn.active { background: #4caf50; }
    .toggle-btn .knob {
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }
    .toggle-btn.active .knob { left: 22px; }
    .control { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      font-size: 12px;
    }
    input, select {
      width: 100%;
      padding: 6px 8px;
      border-radius: 8px;
      border: none;
      background: #2d2d3a;
      color: white;
      font-size: 12px;
    }
    .row {
      display: flex;
      gap: 10px;
    }
    .row .control { flex: 1; }
    .divider {
      height: 1px;
      background: #444;
      margin: 12px 0;
    }
    button {
      width: 100%;
      background: #4c6ef5;
      border: none;
      padding: 8px;
      border-radius: 28px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .status {
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
      opacity: 0.7;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .checkbox-row input {
      width: auto;
      margin: 0;
    }
    .checkbox-row label {
      margin: 0;
      cursor: pointer;
    }
    details {
      margin-top: 12px;
      font-size: 11px;
    }
    summary {
      cursor: pointer;
      color: #888;
    }
  </style>
</head>
<body>
  <h3>🎬 视频助手设置</h3>
  
  <div class="toggle-switch">
    <span>启用插件</span>
    <div id="enableToggle" class="toggle-btn">
      <div class="knob"></div>
    </div>
  </div>
  
  <div class="control">
    <label>⏩ 跳过片头秒数</label>
    <input type="number" id="skipStartSeconds" min="0" max="300" step="5" value="60">
  </div>
  
  <div class="checkbox-row">
    <input type="checkbox" id="showLogPanel">
    <label for="showLogPanel">📋 显示日志面板（调试用）</label>
  </div>
  
  <div class="divider"></div>
  
  <details>
    <summary>⚙️ 集数识别规则（高级设置）</summary>
    
    <div class="row">
      <div class="control">
        <label>最小集数</label>
        <input type="number" id="minEpisode" min="1" max="500" value="1">
      </div>
      <div class="control">
        <label>最大集数</label>
        <input type="number" id="maxEpisode" min="1" max="500" value="500">
      </div>
    </div>
    
    <div class="control">
      <label>必须包含的关键词（用逗号分隔）</label>
      <input type="text" id="mustKeywords" placeholder="集,第,episode,play" value="集,第">
    </div>
    
    <div class="control">
      <label>排除的关键词（用逗号分隔）</label>
      <input type="text" id="excludeKeywords" placeholder="评论,点赞,下一页,首页" value="评论,回复,点赞,收藏,分享,举报,弹幕,下一页,上一页,首页,尾页,播放量,观看,人气,时长,总集数,完结,预告,花絮,推荐">
    </div>
    
    <div class="control">
      <label>CSS选择器（可选，留空自动检测）</label>
      <input type="text" id="customSelector" placeholder=".episode-list a, .playlist a" value="">
    </div>
    
    <div class="control">
      <label>额外排除的URL关键词</label>
      <input type="text" id="excludeUrlKeywords" placeholder="comment,review,user" value="comment,review,user,account,search">
    </div>
    
  </details>
  
  <button id="saveBtn">保存设置</button>
  <div class="status" id="statusMsg">就绪</div>
  
  <script src="popup.js"></script>
</body>
</html>
